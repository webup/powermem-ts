<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerMem Dashboard</title>
  <style>
    :root { --bg: #fff; --fg: #111; --card: #f9fafb; --border: #e5e7eb; --primary: #2563eb; --muted: #6b7280; --danger: #ef4444; --success: #22c55e; }
    [data-theme="dark"] { --bg: #0f172a; --fg: #f1f5f9; --card: #1e293b; --border: #334155; --primary: #3b82f6; --muted: #94a3b8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; }
    .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .controls { display: flex; gap: 8px; align-items: center; }
    button, select { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--fg); cursor: pointer; font-size: 13px; }
    button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .card-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .card-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .card-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .chart-card h3 { font-size: 14px; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-size: 11px; text-transform: uppercase; color: var(--muted); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--border); }
    .bar { height: 20px; background: var(--primary); border-radius: 3px; min-width: 2px; transition: width 0.3s; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .bar-label { font-size: 12px; min-width: 80px; }
    .bar-value { font-size: 12px; color: var(--muted); min-width: 30px; }
    nav { display: flex; gap: 4px; margin-bottom: 24px; }
    nav a { padding: 8px 16px; text-decoration: none; color: var(--muted); border-radius: 6px; font-size: 14px; }
    nav a.active { background: var(--primary); color: #fff; }
    nav a:hover { background: var(--card); }
    .health-card { display: flex; gap: 24px; flex-wrap: wrap; }
    .health-item { flex: 1; min-width: 150px; }
    .health-label { font-size: 12px; color: var(--muted); }
    .health-value { font-size: 16px; font-weight: 600; margin-top: 2px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-green { background: var(--success); }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    #error { display: none; background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 20px; margin-bottom: 24px; color: #991b1b; }
    [data-theme="dark"] #error { background: #450a0a; border-color: #7f1d1d; color: #fecaca; }
    #memories-page, #settings-page { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>PowerMem Dashboard</h1>
        <div class="subtitle">Memory intelligence overview</div>
      </div>
      <div class="controls">
        <select id="timeRange">
          <option value="7d">Last 7 days</option>
          <option value="30d" selected>Last 30 days</option>
          <option value="90d">Last 90 days</option>
          <option value="all">All time</option>
        </select>
        <button id="refreshBtn" onclick="loadDashboard()">Refresh</button>
        <button onclick="toggleTheme()">Theme</button>
      </div>
    </header>

    <nav id="nav">
      <a href="#" class="active" data-page="overview">Overview</a>
      <a href="#" data-page="memories">Memories</a>
      <a href="#" data-page="settings">Settings</a>
    </nav>

    <div id="error"></div>

    <!-- Overview Page -->
    <div id="overview-page">
      <div class="stats-grid" id="statsGrid">
        <div class="loading">Loading stats...</div>
      </div>

      <div class="card" style="margin-bottom:24px" id="healthCard">
        <h3 style="font-size:14px;margin-bottom:12px">System Health</h3>
        <div class="health-card" id="healthContent">Loading...</div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <h3>Growth Trend</h3>
          <div id="growthChart">Loading...</div>
        </div>
        <div class="chart-card">
          <h3>Age Distribution</h3>
          <div id="ageChart">Loading...</div>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size:14px;margin-bottom:12px">Hot Memories (Most Accessed)</h3>
        <table id="hotTable"><tbody><tr><td class="loading">Loading...</td></tr></tbody></table>
      </div>
    </div>

    <!-- Memories Page -->
    <div id="memories-page">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <input id="memSearchInput" placeholder="Search memories..." style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--fg)">
        <button onclick="searchMemories()">Search</button>
        <button onclick="loadMemories()">List All</button>
      </div>
      <div class="card">
        <table id="memTable"><tbody><tr><td class="loading">Loading...</td></tr></tbody></table>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;justify-content:center">
        <button onclick="memPage(-1)">Prev</button>
        <span id="memPageInfo" style="padding:6px 14px;font-size:13px"></span>
        <button onclick="memPage(1)">Next</button>
      </div>
    </div>

    <!-- Settings Page -->
    <div id="settings-page">
      <div class="card">
        <h3 style="font-size:14px;margin-bottom:12px">Configuration</h3>
        <pre id="settingsContent" style="font-size:12px;overflow:auto;max-height:600px">Loading...</pre>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/v1';
    let currentPage = 'overview';
    let memOffset = 0;
    const memLimit = 20;

    // Navigation
    document.querySelectorAll('#nav a').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        showPage(a.dataset.page);
      });
    });

    function showPage(page) {
      currentPage = page;
      document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
      document.getElementById('overview-page').style.display = page === 'overview' ? '' : 'none';
      document.getElementById('memories-page').style.display = page === 'memories' ? '' : 'none';
      document.getElementById('settings-page').style.display = page === 'settings' ? '' : 'none';
      if (page === 'memories') loadMemories();
      if (page === 'settings') loadSettings();
    }

    function toggleTheme() {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    async function apiFetch(endpoint, opts = {}) {
      const res = await fetch(`${API}${endpoint}`, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message || 'API error');
      return json.data;
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.style.display = 'block';
      el.textContent = msg;
    }

    function hideError() {
      document.getElementById('error').style.display = 'none';
    }

    // Dashboard
    async function loadDashboard() {
      hideError();
      try {
        const timeRange = document.getElementById('timeRange').value;
        const [stats, status] = await Promise.all([
          apiFetch(`/memories/stats?time_range=${timeRange}`),
          apiFetch('/system/status'),
        ]);
        renderStats(stats);
        renderHealth(status);
        renderGrowth(stats.growthTrend || stats.growth_trend || {});
        renderAge(stats.ageDistribution || stats.age_distribution || {});
        renderHot(stats.topAccessed || stats.top_accessed || []);
      } catch (err) {
        showError(`Failed to load dashboard: ${err.message}`);
      }
    }

    function renderStats(s) {
      const total = s.totalMemories ?? s.total_memories ?? 0;
      const avgImp = s.avgImportance ?? s.avg_importance ?? 0;
      const topAcc = s.topAccessed ?? s.top_accessed ?? [];
      const density = topAcc.reduce((a, c) => a + (c.accessCount ?? c.access_count ?? 0), 0) / (total || 1);
      const trend = s.growthTrend ?? s.growth_trend ?? {};
      document.getElementById('statsGrid').innerHTML = [
        card('Total Memories', total.toLocaleString(), 'All stored memories'),
        card('Avg Importance', avgImp.toFixed(2), 'Average importance score'),
        card('Access Density', density.toFixed(2), 'Avg accesses per memory'),
        card('Active Days', Object.keys(trend).length, 'Days with memory activity'),
      ].join('');
    }

    function card(title, value, desc) {
      return `<div class="card"><div class="card-title">${title}</div><div class="card-value">${value}</div><div class="card-desc">${desc}</div></div>`;
    }

    function renderHealth(s) {
      document.getElementById('healthContent').innerHTML = `
        <div class="health-item"><div class="health-label">Status</div><div class="health-value"><span class="dot dot-green"></span>${s.status ?? 'running'}</div></div>
        <div class="health-item"><div class="health-label">Version</div><div class="health-value">${s.version ?? '?'}</div></div>
        <div class="health-item"><div class="health-label">Storage</div><div class="health-value">${s.storageType ?? s.storage_type ?? 'sqlite'}</div></div>
        <div class="health-item"><div class="health-label">Uptime</div><div class="health-value">${s.uptime ?? 0}s</div></div>
      `;
    }

    function renderGrowth(trend) {
      const entries = Object.entries(trend).sort();
      if (!entries.length) { document.getElementById('growthChart').innerHTML = '<div class="loading">No data</div>'; return; }
      const max = Math.max(...entries.map(([,v]) => v));
      document.getElementById('growthChart').innerHTML = entries.slice(-14).map(([date, count]) =>
        `<div class="bar-row"><span class="bar-label">${date.slice(5)}</span><div class="bar" style="width:${(count/max)*100}%"></div><span class="bar-value">${count}</span></div>`
      ).join('');
    }

    function renderAge(age) {
      const entries = Object.entries(age);
      if (!entries.length) { document.getElementById('ageChart').innerHTML = '<div class="loading">No data</div>'; return; }
      const max = Math.max(...entries.map(([,v]) => v), 1);
      document.getElementById('ageChart').innerHTML = entries.map(([label, count]) =>
        `<div class="bar-row"><span class="bar-label">${label}</span><div class="bar" style="width:${(count/max)*100}%"></div><span class="bar-value">${count}</span></div>`
      ).join('');
    }

    function renderHot(memories) {
      if (!memories.length) { document.getElementById('hotTable').innerHTML = '<tbody><tr><td style="text-align:center;padding:20px;color:var(--muted)">No access records</td></tr></tbody>'; return; }
      document.getElementById('hotTable').innerHTML = `<thead><tr><th>Content</th><th style="text-align:right">Hits</th></tr></thead><tbody>${
        memories.map(m => `<tr><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic;font-size:12px">"${esc(m.content)}"</td><td style="text-align:right"><span class="badge">${m.accessCount ?? m.access_count ?? 0}</span></td></tr>`).join('')
      }</tbody>`;
    }

    // Memories page
    async function loadMemories() {
      try {
        const data = await apiFetch(`/memories?limit=${memLimit}&offset=${memOffset}`);
        const mems = data.memories ?? [];
        document.getElementById('memTable').innerHTML = `<thead><tr><th>ID</th><th>Content</th><th>User</th><th>Created</th><th></th></tr></thead><tbody>${
          mems.map(m => `<tr><td style="font-size:11px;font-family:monospace">${esc((m.memoryId??m.id??'').toString().slice(-8))}</td><td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.content)}</td><td>${esc(m.userId??m.user_id??'')}</td><td style="font-size:11px">${(m.createdAt??m.created_at??'').slice(0,16)}</td><td><button onclick="deleteMem('${m.memoryId??m.id}')">Del</button></td></tr>`).join('')
        }</tbody>`;
        document.getElementById('memPageInfo').textContent = `${memOffset+1}-${memOffset+mems.length} of ${data.total}`;
      } catch (err) { showError(err.message); }
    }

    async function searchMemories() {
      const q = document.getElementById('memSearchInput').value;
      if (!q) return;
      try {
        const data = await apiFetch('/memories/search', { method: 'POST', body: JSON.stringify({ query: q, limit: 20 }) });
        const results = data.results ?? [];
        document.getElementById('memTable').innerHTML = `<thead><tr><th>ID</th><th>Score</th><th>Content</th></tr></thead><tbody>${
          results.map(r => `<tr><td style="font-size:11px;font-family:monospace">${esc((r.memoryId??'').toString().slice(-8))}</td><td>${(r.score??0).toFixed(3)}</td><td>${esc(r.content)}</td></tr>`).join('')
        }</tbody>`;
      } catch (err) { showError(err.message); }
    }

    async function deleteMem(id) {
      if (!confirm('Delete this memory?')) return;
      await apiFetch(`/memories/${id}`, { method: 'DELETE' });
      loadMemories();
    }

    function memPage(dir) {
      memOffset = Math.max(0, memOffset + dir * memLimit);
      loadMemories();
    }

    // Settings page
    async function loadSettings() {
      try {
        const status = await apiFetch('/system/status');
        document.getElementById('settingsContent').textContent = JSON.stringify(status, null, 2);
      } catch (err) { showError(err.message); }
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s??''; return d.innerHTML; }

    // Init
    loadDashboard();
  </script>
</body>
</html>
