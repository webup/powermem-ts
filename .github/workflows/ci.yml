name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─── Unit + Integration + Regression tests ───────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ─── SeekDB tests (macOS ARM64 — native bindings are darwin-arm64) ────
  test-seekdb:
    name: SeekDB (macOS ARM64)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Verify SeekDB bindings
        run: |
          SEEKDB_DIR=$(node -e "console.log(require.resolve('@seekdb/js-bindings').replace('/seekdb.js',''))")
          echo "SeekDB dir: $SEEKDB_DIR"
          ls -la "$SEEKDB_DIR"/*.node "$SEEKDB_DIR"/*.dylib "$SEEKDB_DIR"/libs/ 2>/dev/null | head -20
          echo "Platform: $(uname -m)"
          # Set library path for native deps
          export DYLD_LIBRARY_PATH="$SEEKDB_DIR:$SEEKDB_DIR/libs:$DYLD_LIBRARY_PATH"
          # Test actual load
          node -e "
            const seekdb = require('@seekdb/js-bindings');
            seekdb.getNativeBindingAsync().then(b => {
              console.log('Native binding loaded OK:', typeof b);
            }).catch(e => {
              console.error('Native binding FAILED:', e.message);
              process.exit(1);
            });
          "

      - name: Run SeekDB tests
        run: |
          SEEKDB_DIR=$(node -e "console.log(require.resolve('@seekdb/js-bindings').replace('/seekdb.js',''))")
          export DYLD_LIBRARY_PATH="$SEEKDB_DIR:$SEEKDB_DIR/libs:$DYLD_LIBRARY_PATH"
          npm run test:seekdb
        timeout-minutes: 5

  # ─── SeekDB tests (Linux x64 — download native bindings from S3) ─────
  test-seekdb-linux:
    name: SeekDB (Linux x64)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Download SeekDB native bindings
        run: |
          SEEKDB_DIR=$(node -e "console.log(require.resolve('@seekdb/js-bindings').replace('/seekdb.js',''))")
          echo "SeekDB dir: $SEEKDB_DIR"
          # Trigger on-demand download
          node -e "
            const { ensureBindingsDownloaded } = require('$SEEKDB_DIR/download.js');
            ensureBindingsDownloaded().then(dir => {
              console.log('Downloaded to:', dir);
            }).catch(e => {
              console.error('Download failed:', e.message);
              process.exit(1);
            });
          "

      - name: Verify SeekDB bindings
        run: |
          node -e "
            const seekdb = require('@seekdb/js-bindings');
            seekdb.getNativeBindingAsync().then(b => {
              console.log('Native binding loaded OK');
            }).catch(e => {
              console.error('FAILED:', e.message);
              process.exit(1);
            });
          "

      - name: Run SeekDB tests
        run: npm run test:seekdb
        timeout-minutes: 5

  # ─── Build verification ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js    || (echo "Missing ESM output" && exit 1)
          test -f dist/index.cjs   || (echo "Missing CJS output" && exit 1)
          test -f dist/index.d.ts  || (echo "Missing DTS output" && exit 1)

  # ─── E2E tests with real Ollama models ───────────────────────────────
  e2e:
    name: E2E (Ollama)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          ollama serve &
          sleep 3

      - name: Pull models
        run: |
          ollama pull nomic-embed-text
          ollama pull qwen2.5:0.5b

      - name: Run e2e tests
        run: npm run test:e2e
        timeout-minutes: 10
