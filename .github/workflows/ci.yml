name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─── Unit + Integration + Regression tests ───────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ─── SeekDB tests (macOS ARM64 — bindings bundled as darwin-arm64) ───
  test-seekdb:
    name: SeekDB (macOS ARM64)
    runs-on: macos-14
    env:
      # Propagate library path to ALL steps including vitest subprocesses
      DYLD_LIBRARY_PATH: ${{ github.workspace }}/node_modules/@seekdb/js-bindings:${{ github.workspace }}/node_modules/@seekdb/js-bindings/libs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Verify SeekDB native binding loads
        run: |
          echo "DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH"
          node -e "
            const seekdb = require('@seekdb/js-bindings');
            seekdb.getNativeBindingAsync().then(b => {
              console.log('SeekDB binding loaded OK');
            }).catch(e => {
              console.error('FAILED:', e.message);
              process.exit(1);
            });
          "

      - name: Verify SeekDB embedded DB works
        run: |
          node -e "
            async function test() {
              const { SeekdbClient, Schema, VectorIndexConfig } = require('seekdb');
              const client = new SeekdbClient({ path: '/tmp/seekdb-ci-check', database: 'test' });
              const schema = new Schema({
                vectorIndex: new VectorIndexConfig({
                  hnsw: { dimension: 3, distance: 'cosine' },
                  embeddingFunction: null
                })
              });
              const col = await client.getOrCreateCollection({ name: 'check', schema });
              await col.add({ ids: ['1'], documents: ['hello'], embeddings: [[1,0,0]] });
              const result = await col.get({ ids: ['1'] });
              console.log('SeekDB embedded works. IDs:', result.ids);
              await client.close();
            }
            test().catch(e => { console.error('FAILED:', e.message); process.exit(1); });
          "

      - name: Run SeekDB tests
        run: npm run test:seekdb --reporter=verbose
        timeout-minutes: 5

  # ─── SeekDB tests (Linux x64 — download bindings + install libaio) ──
  test-seekdb-linux:
    name: SeekDB (Linux x64)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libaio1t64 || sudo apt-get install -y libaio1 || true

      - name: Install dependencies
        run: npm install

      - name: Download SeekDB native bindings
        run: |
          node -e "
            const { ensureBindingsDownloaded } = require('@seekdb/js-bindings/download.js');
            ensureBindingsDownloaded().then(dir => {
              console.log('Downloaded to:', dir);
              // Also extract libseekdb.so from the zip if not present
              const fs = require('fs');
              const path = require('path');
              const soPath = path.join(dir, 'libseekdb.so');
              if (!fs.existsSync(soPath)) {
                const zipPath = path.join(dir, 'seekdb-js-bindings-linux-x64.zip');
                if (fs.existsSync(zipPath)) {
                  const AdmZip = require('adm-zip');
                  const zip = new AdmZip(zipPath);
                  zip.extractEntryTo('libseekdb.so', dir, false, true);
                  console.log('Extracted libseekdb.so');
                }
              }
              console.log('Files:', fs.readdirSync(dir).filter(f => f.endsWith('.so') || f.endsWith('.node')));
            }).catch(e => {
              console.error('Download failed:', e.message);
              process.exit(1);
            });
          "

      - name: Verify SeekDB binding loads
        run: |
          CACHE_DIR=$(node -e "
            const p = require('path'), os = require('os');
            const base = process.env.SEEKDB_BINDINGS_CACHE_DIR || p.join(os.homedir(), '.seekdb', 'bindings');
            console.log(p.join(base, '7548fd4ac9bb9d8a06621dfb1ade3924a95145d6', 'linux-x64'));
          ")
          export LD_LIBRARY_PATH="$CACHE_DIR:$LD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          node -e "
            const seekdb = require('@seekdb/js-bindings');
            seekdb.getNativeBindingAsync().then(b => {
              console.log('SeekDB binding loaded OK');
            }).catch(e => {
              console.error('FAILED:', e.message);
              process.exit(1);
            });
          "

      - name: Run SeekDB tests
        run: |
          CACHE_DIR=$(node -e "
            const p = require('path'), os = require('os');
            const base = process.env.SEEKDB_BINDINGS_CACHE_DIR || p.join(os.homedir(), '.seekdb', 'bindings');
            console.log(p.join(base, '7548fd4ac9bb9d8a06621dfb1ade3924a95145d6', 'linux-x64'));
          ")
          export LD_LIBRARY_PATH="$CACHE_DIR:$LD_LIBRARY_PATH"
          npm run test:seekdb
        timeout-minutes: 5

  # ─── Build verification ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js    || (echo "Missing ESM output" && exit 1)
          test -f dist/index.cjs   || (echo "Missing CJS output" && exit 1)
          test -f dist/index.d.ts  || (echo "Missing DTS output" && exit 1)

  # ─── E2E tests with real Ollama models ───────────────────────────────
  e2e:
    name: E2E (Ollama)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          ollama serve &
          sleep 3

      - name: Pull models
        run: |
          ollama pull nomic-embed-text
          ollama pull qwen2.5:0.5b

      - name: Run e2e tests
        run: npm run test:e2e
        timeout-minutes: 10
