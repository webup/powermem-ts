name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─── Unit + Integration + Regression tests ───────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ─── SeekDB tests (macOS ARM64 — native bindings are darwin-arm64) ────
  test-seekdb:
    name: SeekDB (macOS ARM64)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Verify SeekDB bindings
        run: |
          node -e "
            const path = require('path');
            const binding = path.join(require.resolve('@seekdb/js-bindings'), '..', 'seekdb.node');
            const fs = require('fs');
            console.log('Binding exists:', fs.existsSync(binding));
            console.log('Platform:', process.platform, process.arch);
          "

      - name: Run SeekDB tests
        run: npm run test:seekdb
        timeout-minutes: 5

  # ─── Build verification ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js    || (echo "Missing ESM output" && exit 1)
          test -f dist/index.cjs   || (echo "Missing CJS output" && exit 1)
          test -f dist/index.d.ts  || (echo "Missing DTS output" && exit 1)

  # ─── E2E tests with real Ollama models ───────────────────────────────
  e2e:
    name: E2E (Ollama)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          ollama serve &
          sleep 3

      - name: Pull models
        run: |
          ollama pull nomic-embed-text
          ollama pull qwen2.5:0.5b

      - name: Run e2e tests
        run: npm run test:e2e
        timeout-minutes: 10
